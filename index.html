<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emlak Yatırım & Karar Asistanı</title>
    
    <link rel="icon" href="https://ykaracabay-source.github.io/emlakasistani/logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f3; margin: 0; padding: 20px; color: #333; display: flex; justify-content: center; min-height: 100vh; }
        .eh-container { background: #fff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 850px; margin-top: 20px; overflow: hidden; }
        .page-header { background: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #eee; }
        .eh-tabs { display: flex; background: #2c3e50; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #e67e22; }
        .eh-tab-btn { flex: 1; padding: 15px; background: none; border: none; color: #bdc3c7; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .eh-tab-btn.active { background: #e67e22; color: #fff; }
        .eh-content { padding: 25px; display: none; }
        .eh-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .eh-form-group { margin-bottom: 15px; }
        .eh-form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; color: #2c3e50; }
        .eh-form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1.1rem; font-family: monospace; box-sizing: border-box; font-weight: bold; }
        .eh-form-group input:focus { border-color: #e67e22; outline: none; }
        .eh-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .eh-btn-primary { background: #2c3e50; color: white; }
        .eh-btn-outline { background: transparent; border: 2px dashed #95a5a6; color: #7f8c8d; }
        .eh-result-box { background: #f8f9fa; border-left: 4px solid #e67e22; border-radius: 6px; margin-top: 20px; padding: 15px; }
        .eh-res-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 5px; align-items: center; }
        .eh-verdict { text-align: center; padding: 15px; color: white; font-weight: bold; border-radius: 6px; margin-top: 15px; font-size: 1.1rem; }
        .eh-v-green { background: #27ae60; } .eh-v-red { background: #c0392b; }
        .eh-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .eh-col { flex: 1; min-width: 200px; }
        .eh-inst-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .eh-btn-del { background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 0 15px; cursor: pointer; font-weight: bold; }
        .eh-radio-group { display: flex; gap: 15px; margin-bottom: 20px; background: #ecf0f1; padding: 12px; border-radius: 6px; }
        .eh-stopaj-panel { background: #fffaf0; border: 1px solid #f39c12; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="eh-container">
        
        <div class="page-header">
            <h2><i class="fa-solid fa-chart-pie" style="color: #e67e22;"></i> Emlak Finansal Analiz</h2>
            <button onclick="window.close()" style="background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">Kapat</button>
        </div>

        <div class="eh-tabs">
            <button class="eh-tab-btn active" onclick="ehOpenTab(event, 'tab-tapu')">1. Tapu / Komisyon</button>
            <button class="eh-tab-btn" onclick="ehOpenTab(event, 'tab-karar')">2. Karar Asistanı</button>
            <button class="eh-tab-btn" onclick="ehOpenTab(event, 'tab-amortisman')">3. Amortisman</button>
        </div>

        <div id="tab-tapu" class="eh-content active">
            <h3 style="margin-top:0; color:#2c3e50;">Tapu Harcı ve Hizmet Bedeli Hesaplama</h3>
            <div class="eh-form-group">
                <label>Satış Bedeli (TL)</label>
                <input type="text" id="eh_tapuBedel" onkeyup="ehFormatCur(this)" placeholder="Örn: 5.000.000">
            </div>
            <div class="eh-row">
                <div class="eh-col"><div class="eh-form-group"><label>Tapu Harcı Oranı (%)</label><input type="number" id="eh_oran_tapu" placeholder="Örn: 2" step="0.1"></div></div>
                <div class="eh-col"><div class="eh-form-group"><label>Hizmet Bedeli Oranı (%)</label><input type="number" id="eh_oran_hizmet" placeholder="Örn: 2" step="0.1"></div></div>
                <div class="eh-col"><div class="eh-form-group"><label>KDV Oranı (%)</label><input type="number" id="eh_oran_kdv" placeholder="Örn: 20" step="1"></div></div>
            </div>
            <button class="eh-btn eh-btn-primary" onclick="ehCalcTapu()">HESAPLA</button>
            <div id="eh_resTapu" class="eh-result-box" style="display:none;"></div>
        </div>

        <div id="tab-karar" class="eh-content">
            <div class="eh-stopaj-panel">
                <h4 style="margin:0 0 10px 0; color:#d35400;"><i class="fa-solid fa-scale-balanced"></i> Güncel Stopaj Mevzuat Girişi</h4>
                <div class="eh-row">
                    <div class="eh-col"><label>0-6 Ay Arası (%)</label><input type="number" id="eh_s_06" placeholder="Örn: 17.5"></div>
                    <div class="eh-col"><label>6-12 Ay Arası (%)</label><input type="number" id="eh_s_612" placeholder="Örn: 15"></div>
                    <div class="eh-col"><label>12 Ay ve Üzeri (%)</label><input type="number" id="eh_s_12plus" placeholder="Örn: 10"></div>
                </div>
            </div>

            <div class="eh-row">
                <div class="eh-col"><label>Liste Fiyatı (TL)</label><input type="text" id="eh_k_liste" onkeyup="ehFormatCur(this)" placeholder="Örn: 11.205.000"></div>
                <div class="eh-col"><label>Peşinat Tutarı (TL)</label><input type="text" id="eh_k_pesinat" onkeyup="ehFormatCur(this)" placeholder="Örn: 5.602.500"></div>
            </div>
            <div class="eh-row" style="margin-top:10px;">
                <div class="eh-col"><label>Mevduat Faizi (Yıllık Brüt %)</label><input type="number" id="eh_k_mevduat" placeholder="Örn: 45"></div>
                <div class="eh-col"><label>Peşin İndirimi (%)</label><input type="number" id="eh_k_indirim" placeholder="Örn: 10"></div>
            </div>

            <hr style="margin:25px 0; border:0; border-top:1px solid #ddd;">
            <div class="eh-radio-group">
                <label><input type="radio" name="eh_plan_tipi" value="sabit" checked onchange="ehTogglePlan()"> Sabit Taksitli</label>
                <label><input type="radio" name="eh_plan_tipi" value="esnek" onchange="ehTogglePlan()"> Esnek / Ara Ödemeli</label>
            </div>

            <div id="eh_plan_sabit">
                <div class="eh-row">
                    <div class="eh-col"><label>Vade Süresi (Ay)</label><input type="number" id="eh_k_vade" placeholder="Örn: 15"></div>
                    <div class="eh-col"><label>Taksitlere Uygulanan Vade Farkı (%)</label><input type="number" id="eh_k_vadeFarki" placeholder="Örn: 0"></div>
                </div>
            </div>
            <div id="eh_plan_esnek" style="display:none; background:#fafafa; padding:15px; border-radius:6px; border:1px solid #eee;">
                <label style="display:block; font-weight:bold; margin-bottom:10px;">Ödeme Planı Detayları</label>
                <div id="eh_esnek_container"></div>
                <button class="eh-btn eh-btn-outline" onclick="ehAddRow('', '')">+ Ödeme Dönemi Ekle</button>
            </div>

            <button class="eh-btn eh-btn-primary" onclick="ehCalcKarar()">ANALİZ ET VE KARŞILAŞTIR</button>

            <div class="eh-result-box" id="eh_resKarar" style="display:none;">
                <div class="eh-res-row" id="eh_row_aylikTaksit"><span>Aylık Taksit:</span><strong id="eh_r_aylik">0 ₺</strong></div>
                <div class="eh-res-row"><span>İndirimli Peşin Fiyat:</span><strong id="eh_r_pesin">0 ₺</strong></div>
                <div class="eh-res-row"><span>Vadeli Plan Reel Maliyeti (NPV):</span><strong id="eh_r_npv" style="color:#e67e22;">0 ₺</strong></div>
                <div id="eh_r_adv_box" style="text-align:center; padding:15px; margin:10px 0; border-top:1px dashed #ddd; border-bottom:1px dashed #ddd;"></div>
                <div id="eh_r_kararKutusu" class="eh-verdict"></div>
                <button class="eh-btn eh-btn-outline" id="btn_pdf" style="border-color:#2980b9; color:#2980b9; background:#ebf5fb;" onclick="ehGeneratePDF()">
                    <i class="fa-solid fa-file-pdf"></i> DETAYLI PDF RAPORU İNDİR
                </button>
            </div>
        </div>

        <div id="tab-amortisman" class="eh-content">
            <h3 style="margin-top:0; color:#2c3e50;">Yatırım Geri Dönüşü (Amortisman)</h3>
            <div class="eh-row">
                <div class="eh-col"><label>Mülk Satış Fiyatı (TL)</label><input type="text" id="eh_a_fiyat" onkeyup="ehFormatCur(this)" placeholder="Örn: 3.500.000"></div>
                <div class="eh-col"><label>Aylık Kira Getirisi (TL)</label><input type="text" id="eh_a_kira" onkeyup="ehFormatCur(this)" placeholder="Örn: 25.000"></div>
            </div>
            <button class="eh-btn eh-btn-primary" onclick="ehCalcAmortisman()">AMORTİSMAN HESAPLA</button>
            <div id="eh_resAmort" class="eh-result-box" style="display:none; text-align:center;"></div>
        </div>
        
    </div>

<script>
    const ehFormatter = new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', maximumFractionDigits: 0 });
    function ehFormatCur(el) { let val = el.value.replace(/\D/g, ""); if(!val) { el.value = ""; return; } el.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function ehGetNum(id) { let val = document.getElementById(id).value; return parseFloat(val.replace(/\./g, '')) || 0; }
    function ehOpenTab(evt, tabId) { document.querySelectorAll('.eh-content').forEach(el => el.classList.remove('active')); document.querySelectorAll('.eh-tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(tabId).classList.add('active'); evt.currentTarget.classList.add('active'); }
    function ehTogglePlan() { let isS = document.querySelector('input[name="eh_plan_tipi"]:checked').value === 'sabit'; document.getElementById('eh_plan_sabit').style.display = isS ? 'block' : 'none'; document.getElementById('eh_plan_esnek').style.display = isS ? 'none' : 'block'; }
    function ehAddRow(ay, tutar) { let div = document.createElement('div'); div.className = 'eh-inst-row'; div.innerHTML = `<input type="number" class="eh-esnek-ay" value="${ay}" placeholder="Ay" style="width:70px;"><input type="text" class="eh-esnek-tutar" value="${tutar}" placeholder="Örn: 100.000" onkeyup="ehFormatCur(this)" style="flex:1;"><button class="eh-btn-del" onclick="this.parentElement.remove()">X</button>`; document.getElementById('eh_esnek_container').appendChild(div); }

    // 1. TAPU HESABI
    function ehCalcTapu() {
        let b = ehGetNum('eh_tapuBedel'); if(!b) return;
        let oT = (parseFloat(document.getElementById('eh_oran_tapu').value)||2)/100, oH = (parseFloat(document.getElementById('eh_oran_hizmet').value)||2)/100, oK = (parseFloat(document.getElementById('eh_oran_kdv').value)||20)/100;
        let hrc = b * oT, hiz = b * oH, kdv = hiz * oK;
        const res = document.getElementById('eh_resTapu'); res.style.display = 'block';
        res.innerHTML = `<h4>Alıcı Toplam Maliyeti: ${ehFormatter.format(hrc+hiz+kdv)}</h4><p style="font-size:0.9rem; color:#666;">Tapu Harcı: ${ehFormatter.format(hrc)} | Hizmet Bedeli: ${ehFormatter.format(hiz)} | KDV: ${ehFormatter.format(kdv)}</p>`;
    }

    // 2. KARAR ASİSTANI
    function ehCalcKarar() {
        const listP = ehGetNum('eh_k_liste'), pesinT = ehGetNum('eh_k_pesinat'), brütMev = parseFloat(document.getElementById('eh_k_mevduat').value), indirim = parseFloat(document.getElementById('eh_k_indirim').value)||0, isS = document.querySelector('input[name="eh_plan_tipi"]:checked').value === 'sabit';
        if(!listP || isNaN(brütMev)) { alert("Lütfen liste fiyatı ve mevduat faiz oranını giriniz."); return; }

        let vadeNum = 0;
        if(isS) vadeNum = parseInt(document.getElementById('eh_k_vade').value)||0;
        else { document.querySelectorAll('.eh-inst-row').forEach(r => vadeNum += parseInt(r.querySelector('.eh-esnek-ay').value)||0); }

        let stp = 0;
        if(vadeNum <= 6) stp = parseFloat(document.getElementById('eh_s_06').value);
        else if(vadeNum <= 12) stp = parseFloat(document.getElementById('eh_s_612').value);
        else stp = parseFloat(document.getElementById('eh_s_12plus').value);

        if(isNaN(stp)) { alert(vadeNum + " aylık vade için mevzuat panelindeki stopaj oranını giriniz."); return; }

        const netAylikFaiz = (brütMev * (1 - (stp/100))) / 1200;
        let npv = pesinT, taksit = 0;

        if(isS){
            let m = vadeNum, r = (parseFloat(document.getElementById('eh_k_vadeFarki').value)||0)/100;
            taksit = r === 0 ? (listP-pesinT)/m : (listP-pesinT)*(r*Math.pow(1+r,m))/(Math.pow(1+r,m)-1);
            for(let i=1;i<=m;i++) npv += taksit/Math.pow(1+netAylikFaiz,i);
            document.getElementById('eh_row_aylikTaksit').style.display='flex'; document.getElementById('eh_r_aylik').innerText=ehFormatter.format(taksit);
        } else {
            document.getElementById('eh_row_aylikTaksit').style.display='none';
            let flow = []; document.querySelectorAll('.eh-inst-row').forEach(row=>{
                let d=parseInt(row.querySelector('.eh-esnek-ay').value)||0, a=parseFloat(row.querySelector('.eh-esnek-tutar').value.replace(/\./g,''))||0;
                for(let i=0;i<d;i++) flow.push(a);
            });
            for(let i=0;i<flow.length;i++) npv += flow[i]/Math.pow(1+netAylikFaiz,i+1);
            let odenen = pesinT + flow.reduce((a,b)=>a+b,0);
            if(odenen < listP) npv += (listP-odenen)/Math.pow(1+netAylikFaiz, flow.length+1);
        }

        const pesinF = listP*(1-(indirim/100)), diff = Math.abs(pesinF-npv);
        document.getElementById('eh_r_pesin').innerText=ehFormatter.format(pesinF); document.getElementById('eh_r_npv').innerText=ehFormatter.format(npv);
        const advB = document.getElementById('eh_r_adv_box'), verdB = document.getElementById('eh_r_kararKutusu');
        if(pesinF > npv){
            advB.innerHTML = `<small>NET REEL KAZANÇ (AVANTAJ)</small><br><strong style="font-size:1.6rem; color:#27ae60;">${ehFormatter.format(diff)}</strong>`;
            verdB.className="eh-verdict eh-v-green"; verdB.innerHTML="TAVSİYE: VADELİ ALIN!";
        } else {
            advB.innerHTML = `<small>NET REEL KAZANÇ (AVANTAJ)</small><br><strong style="font-size:1.6rem; color:#c0392b;">${ehFormatter.format(diff)}</strong>`;
            verdB.className="eh-verdict eh-v-red"; verdB.innerHTML="TAVSİYE: PEŞİN ALIN!";
        }
        document.getElementById('eh_resKarar').style.display='block';
    }

    // 3. AMORTİSMAN HESABI
    function ehCalcAmortisman() {
        let f = ehGetNum('eh_a_fiyat'), k = ehGetNum('eh_a_kira'); if(!f || !k) return;
        let am = f/(k*12); const res = document.getElementById('eh_resAmort'); res.style.display = 'block';
        res.innerHTML = `<h4>Amortisman Süresi: ${am.toFixed(1)} Yıl</h4><p>Yıllık Brüt ROI (Kira Getirisi): %${(100/am).toFixed(2)}</p>`;
    }

    window.onload = function() { ehAddRow('', ''); };

    // --- PDF RAPOR MOTORU ---
    function ehGeneratePDF() {
        if(document.getElementById('eh_resKarar').style.display === 'none') { alert("Önce 'Analiz Et' butonuna basarak hesaplama yapmalısınız."); return; }

        const isS = document.querySelector('input[name="eh_plan_tipi"]:checked').value === 'sabit';
        const listP = ehGetNum('eh_k_liste'), pesinT = ehGetNum('eh_k_pesinat'), brütM = parseFloat(document.getElementById('eh_k_mevduat').value), ind = parseFloat(document.getElementById('eh_k_indirim').value)||0;
        
        let vadeNum = 0;
        if(isS) vadeNum = parseInt(document.getElementById('eh_k_vade').value)||1;
        else document.querySelectorAll('.eh-inst-row').forEach(r => vadeNum += parseInt(r.querySelector('.eh-esnek-ay').value)||0);

        let stp = vadeNum <= 6 ? ehGetNum('eh_s_06') : (vadeNum <= 12 ? ehGetNum('eh_s_612') : ehGetNum('eh_s_12plus'));
        const netRate = (brütM * (1 - (stp/100))) / 1200;

        let initialKasa = (listP * (1 - (ind/100))) - pesinT;
        let kasa = initialKasa, cashRows = [], mPayments = [];

        if(isS){
            let tp = parseFloat(document.getElementById('eh_r_aylik').innerText.replace(/[^\d]/g,''))/100;
            for(let i=1;i<=vadeNum;i++) mPayments[i] = tp;
        } else {
            let flow = []; document.querySelectorAll('.eh-inst-row').forEach(r=>{
                let d=parseInt(r.querySelector('.eh-esnek-ay').value)||0, a=parseFloat(r.querySelector('.eh-esnek-tutar').value.replace(/\./g,''))||0;
                for(let i=0;i<d;i++) flow.push(a);
            });
            for(let i=1;i<=flow.length;i++) mPayments[i] = flow[i-1];
            let ball = (pesinT + flow.reduce((a,b)=>a+b,0) < listP) ? (listP - (pesinT + flow.reduce((a,b)=>a+b,0))) : 0;
            if(ball>0) { mPayments[flow.length+1] = ball; vadeNum = flow.length+1; }
        }

        for(let m=1; m<=vadeNum; m++){
            let faiz = kasa * netRate, taks = mPayments[m]||0, son = kasa + faiz - taks;
            cashRows.push({ m, bas: kasa, faiz, taks, son });
            kasa = son;
        }

        const report = document.createElement('div');
        report.style.width = '794px'; report.style.padding = '40px'; report.style.background = '#fff';
        report.innerHTML = `
            <div style="font-family: Arial; border:2px solid #e67e22; padding:30px; border-radius:10px;">
                <h1 style="text-align:center; color:#2c3e50; border-bottom:2px solid #e67e22; padding-bottom:10px;">Yatırım Stratejisi & Karar Analizi</h1>
                <div style="display:flex; justify-content:space-between; margin:20px 0; font-size:14px;">
                    <div><strong>Liste Fiyatı:</strong> ${ehFormatter.format(listP)}<br><strong>Peşinat:</strong> ${ehFormatter.format(pesinT)}</div>
                    <div style="text-align:right;"><strong>Brüt Mevduat Faizi:</strong> %${brütM}<br><strong>Net Getiri (Stopaj Dahil):</strong> %${(brütM*(1-stp/100)).toFixed(2)}</div>
                </div>
                <div style="background:#f4f6f7; padding:20px; text-align:center; border-radius:8px; margin-bottom:20px;">
                    <h2 style="margin:0; color:#27ae60;">${document.getElementById('eh_r_adv_box').innerText}</h2>
                    <p style="margin:5px 0; color:#555;">Vadeli alım seçeneğinin paranın zaman değeri avantajı.</p>
                </div>
                <div style="page-break-before: always; height:1px;"></div>
                <h3 style="border-bottom:2px solid #2c3e50; padding-bottom:5px; margin-top:30px;">Detaylı Nakit Akış & Kasa Projeksiyonu</h3>
                <table style="width:100%; border-collapse:collapse; font-size:12px; table-layout: fixed;">
                    <thead><tr style="background:#2c3e50; color:#fff;">
                        <th style="padding:8px; border:1px solid #ddd; width:40px;">Ay</th><th style="padding:8px; border:1px solid #ddd;">Kasa (Başı)</th><th style="padding:8px; border:1px solid #ddd;">Faiz Getirisi</th><th style="padding:8px; border:1px solid #ddd;">Taksit</th><th style="padding:8px; border:1px solid #ddd;">Kasa (Sonu)</th>
                    </tr></thead>
                    <tbody>${cashRows.map(r => `<tr><td style="padding:6px; border:1px solid #ddd; text-align:center;">${r.m}</td><td style="padding:6px; border:1px solid #ddd;">${ehFormatter.format(r.bas)}</td><td style="padding:6px; border:1px solid #ddd; color:green;">+${ehFormatter.format(r.faiz)}</td><td style="padding:6px; border:1px solid #ddd; color:red;">-${ehFormatter.format(r.taks)}</td><td style="padding:6px; border:1px solid #ddd; font-weight:bold;">${ehFormatter.format(r.son)}</td></tr>`).join('')}</tbody>
                </table>
                <div style="margin-top:30px; font-size:10px; color:#777; border-top:1px solid #eee; padding-top:10px;">
                    <strong>Bilgi:</strong> Bu rapor mülk alım kararı sürecinde finansal bir projeksiyon sunmak amacıyla hazırlanmıştır. Mevduat faizi ve stopaj oranlarının vade boyunca sabit kalacağı varsayılmıştır.
                </div>
            </div>
        `;

        html2pdf().set({ margin:10, filename:'Emlak_Karar_Raporu.pdf', html2canvas:{scale:2, windowWidth: 800}, jsPDF:{unit:'mm', format:'a4', orientation:'portrait'} }).from(report).save();
    }
</script>
</body>
</html>
